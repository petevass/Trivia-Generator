<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Profile')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-5" style="max-width:680px">

    <!-- Loading -->
    <div id="loading-section" class="text-center py-5">
        <div class="spinner-border" style="color:var(--accent);width:3rem;height:3rem" role="status"></div>
        <p class="mt-3" style="color:var(--text-muted)">Loading profile...</p>
    </div>

    <!-- Profile content -->
    <div id="profile-content" class="d-none">
        <!-- Avatar + Name -->
        <div class="text-center mb-5">
            <div class="avatar mx-auto" id="user-avatar">??</div>
            <h2 class="fw-bold mt-2 mb-1" id="user-name">Player</h2>
            <span style="background:rgba(124,58,237,.15);color:var(--accent);border:1px solid var(--accent);padding:.25rem .9rem;border-radius:1rem;font-size:.8rem;font-weight:600">
                <i class="bi bi-person-check me-1"></i>Player
            </span>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-5">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="total-answered" style="color:var(--accent)">0</div>
                    <div class="stat-label">Answered</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="total-correct" style="color:var(--success)">0</div>
                    <div class="stat-label">Correct</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="total-wrong" style="color:var(--danger)">0</div>
                    <div class="stat-label">Wrong</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="accuracy" style="color:var(--warning)">0%</div>
                    <div class="stat-label">Accuracy</div>
                </div>
            </div>
        </div>

        <!-- Accuracy bar -->
        <div class="card p-4 mb-4">
            <p class="mb-2 fw-semibold" style="font-size:.85rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)">Accuracy</p>
            <div class="progress mb-2" style="height:.75rem">
                <div class="progress-bar" id="accuracy-bar" style="width:0%"></div>
            </div>
            <div class="d-flex justify-content-between">
                <small style="color:var(--text-muted)">0%</small>
                <small id="accuracy-label" style="color:var(--accent);font-weight:600">0%</small>
                <small style="color:var(--text-muted)">100%</small>
            </div>
        </div>

        <!-- Actions -->
        <div class="text-center d-flex flex-wrap justify-content-center gap-2">
            <a href="/pages/session/setup" class="btn btn-primary">
                <i class="bi bi-play-fill me-1"></i>Play Trivia
            </a>
            <a href="/pages/leaderboard" class="btn btn-outline-primary">
                <i class="bi bi-trophy me-1"></i>Leaderboard
            </a>
            <button class="btn btn-outline-danger" onclick="logout()">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
<script th:src="@{/js/profile.js}"></script>
</body>
</html>
