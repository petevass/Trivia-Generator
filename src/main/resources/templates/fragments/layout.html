<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | TriviaGen'">TriviaGen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-lightning-charge-fill me-1"></i>TriviaGen</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <i class="bi bi-list text-light" style="font-size:1.5rem"></i>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Home</a></li>
            </ul>
            <!-- Not logged in -->
            <div id="nav-auth-section" class="d-none">
                <a href="/pages/login" class="btn btn-outline-primary btn-sm me-2">Login</a>
                <a href="/pages/login?tab=register" class="btn btn-primary btn-sm">Register</a>
            </div>
            <!-- Logged in -->
            <div id="nav-user-section" class="d-none d-flex align-items-center gap-2">
                <a class="nav-link" href="/pages/leaderboard"><i class="bi bi-trophy me-1"></i>Leaderboard</a>
                <a class="nav-link" href="/pages/session/setup"><i class="bi bi-play-circle me-1"></i>Play</a>
                <a class="nav-link" href="/pages/profile"><i class="bi bi-person-circle me-1"></i>Profile</a>
                <button class="btn btn-sm btn-outline-danger ms-2" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer">
    <div class="container text-center">
        <p class="mb-0"><i class="bi bi-lightning-charge-fill me-1" style="color:var(--accent)"></i>TriviaGen &copy; 2025</p>
    </div>
</footer>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>
</th:block>

</body>
</html>
