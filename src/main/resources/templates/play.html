<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Play')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-4" style="max-width:740px">

    <!-- Loading -->
    <div id="loading-screen" class="text-center py-5">
        <div class="spinner-border" style="color:var(--accent);width:3rem;height:3rem" role="status"></div>
        <p class="mt-3" style="color:var(--text-muted)">Loading questions...</p>
    </div>

    <!-- Error -->
    <div id="error-screen" class="d-none text-center py-5">
        <i class="bi bi-exclamation-triangle-fill mb-3 d-block" style="font-size:3rem;color:var(--danger)"></i>
        <p id="error-msg" class="mb-4" style="color:var(--text-muted)">Something went wrong.</p>
        <a href="/pages/session/setup" class="btn btn-primary">Start New Session</a>
    </div>

    <!-- Game -->
    <div id="game-screen" class="d-none">
        <!-- Top bar -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div style="color:var(--text-muted);font-size:.9rem">
                Question <span id="progress-text" class="fw-bold" style="color:var(--text)">1</span>
            </div>
            <div>
                <span style="color:var(--text-muted);font-size:.9rem">Score: </span>
                <span id="current-score" class="fw-bold" style="color:var(--success);font-size:1.1rem">0</span>
            </div>
            <button id="end-session-btn" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-stop-circle me-1"></i>End
            </button>
        </div>

        <!-- Progress bar -->
        <div class="progress mb-4" style="height:.5rem">
            <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>

        <!-- Feedback banner -->
        <div id="feedback-banner" class="feedback-banner"></div>

        <!-- Question -->
        <div class="question-card">
            <p class="question-text" id="question-text">Loading...</p>
        </div>

        <!-- Answers -->
        <div id="answers-container" class="mt-3"></div>
    </div>

    <!-- Results -->
    <div id="results-screen" class="d-none">
        <div class="results-card my-4">
            <i class="bi bi-trophy-fill d-block mb-3" style="font-size:3.5rem;color:var(--warning)"></i>
            <div class="results-score" id="results-correct">0</div>
            <p style="color:var(--text-muted)" class="mb-1">correct out of <strong id="results-total" style="color:var(--text)">0</strong></p>
            <p class="mb-3">
                <span id="results-accuracy" style="color:var(--accent);font-size:1.5rem;font-weight:700">0%</span>
                <span style="color:var(--text-muted)"> accuracy</span>
            </p>
            <p id="results-message" class="small mb-4" style="color:var(--text-muted)"></p>
            <div class="d-flex flex-wrap justify-content-center gap-2">
                <a href="/pages/session/setup" class="btn btn-primary">
                    <i class="bi bi-arrow-repeat me-1"></i>Play Again
                </a>
                <a href="/" class="btn btn-outline-primary">
                    <i class="bi bi-house me-1"></i>Home
                </a>
                <a href="/pages/leaderboard" class="btn btn-outline-secondary">
                    <i class="bi bi-trophy me-1"></i>Leaderboard
                </a>
            </div>
        </div>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
<script th:src="@{/js/play.js}"></script>
</body>
</html>
