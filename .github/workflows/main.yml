name: Spring Boot CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  # Allows you to run the workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test Spring Boot Application
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          # These are temporary test credentials only.
          # They are created when the job starts and disappear afterward.
          POSTGRES_DB: trivia_test
          POSTGRES_USER: trivia_user
          POSTGRES_PASSWORD: trivia_test_password

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U trivia_user -d trivia_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # Values expected by your application.properties file
      POSTGRES_URL: jdbc:postgresql://localhost:5432/trivia_test
      POSTGRES_USERNAME: trivia_user
      POSTGRES_PASSWORD: trivia_test_password

      # Retrieved securely from GitHub Repository Secrets
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # Also overrides the Spring property directly
      SECURITY_JWT_SECRET_KEY: ${{ secrets.JWT_SECRET }}

      # Recommended test configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SPRING_PROFILES_ACTIVE: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Display Java and Maven versions
        run: |
          java --version
          ./mvnw --version

      - name: Build application and run tests
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spring-boot-test-results
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Spring Boot JAR
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: trivia-generator-application
          path: |
            target/*.jar
            !target/*-sources.jar
            !target/*-javadoc.jar
          if-no-files-found: error
          retention-days: 7
